<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Viagem Final</title>
    <link rel="icon" href="logo-certo.png">
    <link rel="stylesheet" href="css/galeria.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/global.css">
</head>
    <script>
      window.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
            const img = document.getElementById("mode-toggle");
        if (img) {
          img.src = "../primeiro-site/dark-mode.png";
            img.alt = "Modo claro";
      }
    }
  });

  function toggleMode() {
    const body = document.body;
    const img = document.getElementById("mode-toggle");

    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
      localStorage.setItem("darkMode", "true");
      img.src = "../primeiro-site/light-mode.png";
      img.alt = "Modo claro";
    } else {
      localStorage.setItem("darkMode", "false");
      img.src = "../primeiro-site/dark-mode.png";
      img.alt = "Modo escuro";
    }
  }
</script>
<script>
function abrirModal(src) {
  const modal = document.getElementById("modal");
  const img = document.getElementById("img-modal");

  img.src = src;
  modal.style.display = "flex";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}
</script>
