<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Viagem Final</title>
    <link rel="icon" href="logo-certo.png">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/jogo.css">
    <link rel="stylesheet" href="css/global.css">
</head>
    <script>
      window.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
            const img = document.getElementById("mode-toggle");
        if (img) {
          img.src = "../primeiro-site/dark-mode.png";
            img.alt = "Modo claro";
      }
    }
  });

  function toggleMode() {
    const body = document.body;
    const img = document.getElementById("mode-toggle");

    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
      localStorage.setItem("darkMode", "true");
      img.src = "../primeiro-site/light-mode.png";
      img.alt = "Modo claro";
    } else {
      localStorage.setItem("darkMode", "false");
      img.src = "../primeiro-site/dark-mode.png";
      img.alt = "Modo escuro";
    }
  }
</script>
<body>
    <header>
    <nav>
        <div>
          <img class="logo-cima" src="logo-semfundo.jpg" alt="logo principal">
        </div>
      <ul>
      <li>
        <img id="mode-toggle" src="../primeiro-site/dark-mode.png" alt="Alternar modo" onclick="toggleMode()">
      </li>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="galeria.html">Minha Galeria</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a class="botao-jogar" href="../primeiro-site/jogo.html">Jogar</a></li>
      </ul>
    </nav>
    </header>
    <main class="conteudo-sensivel">
      <iframe class="jogo-iframe" src="../primeiro-jogo/jogo-salvo/jogo-completo/index.html" width="100%" height="500px"></iframe>
      <p class="controles">Controles: Setas do teclado para mover a nave, Esquerdo do mouse para atirar e scroll para turbo.</p>
    </main>
  </body>
    <script src="js/idade.js"></script>
</html>
