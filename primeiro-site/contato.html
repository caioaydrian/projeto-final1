<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Viagem Final</title>
    <link rel="icon" href="logo-certo.png">
    <link rel="stylesheet" href="css/contato.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/global.css">
</head>
    <script>
      window.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
            const img = document.getElementById("mode-toggle");
        if (img) {
          img.src = "../primeiro-site/dark-mode.png";
            img.alt = "Modo claro";
      }
    }
  });

  function toggleMode() {
    const body = document.body;
    const img = document.getElementById("mode-toggle");

    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
      localStorage.setItem("darkMode", "true");
      img.src = "../primeiro-site/light-mode.png";
      img.alt = "Modo claro";
    } else {
      localStorage.setItem("darkMode", "false");
      img.src = "../primeiro-site/dark-mode.png";
      img.alt = "Modo escuro";
    }
  }
</script>
<body>
    <header>
        <nav>
        <div>
          <img class="logo-cima" src="logo-semfundo.jpg" alt="logo principal">
        </div>
    <ul>
      <li>
        <img id="mode-toggle" src="../primeiro-site/dark-mode.png" alt="Alternar modo" onclick="toggleMode()">
      </li>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="galeria.html">Minha Galeria</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a class="botao-jogar" href="../primeiro-site/jogo.html">Jogar</a></li>
      </ul>
        </nav>
    </header>
    <main class="conteudo-sensivel">
        <section class="contato-section">
            <h1>Contato</h1>
            <p>Olá, eu sou o Caio Aydrian, o criador do jogo A Viagem Final!</p> 
            <p>Envie sua mensagem abaixo e eu responderei o mais rápido possível.</p>

            <form class="contato-form" action="#" method="post">
                <label for="nome">Nome</label>
                <input id="nome" name="nome" type="text" placeholder="Seu nome" required>

                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="seu@exemplo.com" required>

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem" required></textarea>

                <button type="submit">Enviar mensagem</button>
            </form>
        </section>
    </main>
    <footer>
      <p>&copy; 2026 A Viagem Final. Desenvolvido por Caio Aydrian.</p>
    </footer>
  </body>
    <script src="js/idade.js"></script>
</html>
